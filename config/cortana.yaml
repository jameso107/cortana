# Cortana configuration
inference:
  host: localhost
  port: 8080
  model: Qwen3-30B-A3B-Q6_K.gguf
  context_window: 16384
  gpu_layers: 99
  threads: 8
  temperature: 0.7
  tool_temperature: 0.2
  flash_attention: true
  connect_timeout: 10.0
  request_timeout: 120.0        # abort/fallback if llama-server stalls this long
  reply_reserve_tokens: 1024    # context kept free for the model's own reply

voice:
  # Voice is toggled from the UI (no wake word). See VoicePipeline.set_listening.
  stt_model: medium.en        # or large-v3
  tts_engine: kokoro          # or macos
  tts_voice: af_sky          # Kokoro American-female — closest to Halo/movie Cortana
  vad_threshold: 0.5
  silence_ms: 800             # ms of silence to end utterance
  push_to_talk_hotkey: "cmd+space"

memory:
  episodic_path: ~/.cortana/memory/chroma
  structured_path: ~/.cortana/memory/cortana.db
  embedding_model: nomic-embed-text
  context_tokens: 2048        # max tokens of facts + recall injected per turn
  decay_half_life_days: 30
  min_similarity: 0.25        # drop recalled memories below this cosine similarity
  min_query_words: 3          # skip retrieval for very short / pronoun-only turns

plugins:
  directory: ~/.cortana/plugins
  builtin_directory: cortana/plugins/builtin

logging:
  level: INFO
  path: ~/.cortana/logs/cortana.log
  max_bytes: 5000000
  backup_count: 3

safety:
  confirm_destructive: true
  dry_run_default: false
  terminal_allowlist: []
  terminal_blocklist: ["rm -rf /", "sudo rm"]
