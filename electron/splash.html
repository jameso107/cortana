<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: rgba(0,4,8,0.95);
    color: #00d4ff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    border-radius: 16px;
    border: 1px solid #00d4ff33;
    overflow: hidden;
    -webkit-app-region: drag;
  }
  .orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid #00d4ff;
    box-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff55, inset 0 0 20px #00d4ff22;
    animation: pulse 2s ease-in-out infinite;
    margin-bottom: 28px;
    position: relative;
  }
  .orb::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid #00d4ff66;
    animation: pulse 2s ease-in-out infinite reverse;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px #00d4ff, 0 0 40px #00d4ff55; }
    50%       { box-shadow: 0 0 30px #00d4ff, 0 0 60px #00d4ff88, 0 0 90px #00d4ff33; }
  }
  .wordmark {
    font-size: 22px;
    letter-spacing: 8px;
    color: #b8e8ff;
    margin-bottom: 32px;
  }
  .wordmark span { color: #00d4ff; }
  #status {
    font-size: 11px;
    color: #6699aa;
    letter-spacing: 1px;
    text-align: center;
    min-height: 20px;
    transition: opacity 0.3s;
  }
  .bar-wrap {
    width: 200px;
    height: 2px;
    background: #00d4ff22;
    border-radius: 2px;
    margin-top: 18px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    background: #00d4ff;
    border-radius: 2px;
    animation: scan 2s linear infinite;
    width: 40%;
  }
  @keyframes scan {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(600%); }
  }
</style>
</head>
<body>
  <div class="orb"></div>
  <div class="wordmark"><span>C</span>ORTANA</div>
  <div id="status">Initializing…</div>
  <div class="bar-wrap"><div class="bar"></div></div>
</body>
</html>
